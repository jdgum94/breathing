<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Breathwork</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #12141c;
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      overflow: hidden;
    }

    .controls {
      position: absolute;
      top: 10%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      z-index: 10;
      width: 90%;
      max-width: 350px;
    }

    select, button {
      padding: 14px;
      font-size: 16px;
      border-radius: 12px;
      border: none;
      outline: none;
      cursor: pointer;
      font-weight: 600;
      text-align: center;
    }

    select {
      background-color: #2a2e40;
      color: white;
      appearance: none;
    }

    select:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    button {
      background-color: #4facfe;
      color: #000;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: #00f2fe;
    }

    button.stop {
      background-color: #ff4b4b;
      color: white;
    }

    .breathing-area {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: 50px;
    }

    .circle {
      position: absolute;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: radial-gradient(circle, #4facfe 0%, #00f2fe 100%);
      box-shadow: 0 0 30px rgba(79, 172, 254, 0.4);
      /* Add transition for smooth color changes */
      transition: transform linear, background 0.5s ease, box-shadow 0.5s ease;
    }

    .instruction {
      position: absolute;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0px 2px 10px rgba(0,0,0,0.8);
      z-index: 5;
      text-align: center;
      line-height: 1.3;
    }

    .sub-instruction {
      margin-top: 10px;
      font-size: 16px;
      color: #aaa;
      height: 24px; /* Fixed height to prevent layout jumping */
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="controls">
    <select id="patternSelect">
      <option value="478">Relaxing (4-7-8)</option>
      <option value="box">Box Breathing (4-4-4-4)</option>
      <option value="resonance">Resonance (5-5)</option>
      <option value="bolt">BOLT Score Test</option>
    </select>
    
    <select id="durationSelect">
      <option value="0">Duration: Indefinite</option>
      <option value="1">Duration: 1 Minute</option>
      <option value="5">Duration: 5 Minutes</option>
      <option value="10">Duration: 10 Minutes</option>
      <option value="20">Duration: 20 Minutes</option>
    </select>

    <button id="toggleBtn">Start</button>
  </div>

  <div class="breathing-area">
    <div class="circle" id="circle"></div>
    <div class="instruction" id="instruction">Ready</div>
  </div>
  <div class="sub-instruction" id="subInstruction"></div>

  <script>
    const patterns = {
      '478': [
        { name: 'Inhale', duration: 4000, scale: 3 },
        { name: 'Hold', duration: 7000, scale: 3 },
        { name: 'Exhale', duration: 8000, scale: 1 }
      ],
      'box': [
        { name: 'Inhale', duration: 4000, scale: 3 },
        { name: 'Hold', duration: 4000, scale: 3 },
        { name: 'Exhale', duration: 4000, scale: 1 },
        { name: 'Hold', duration: 4000, scale: 1 }
      ],
      'resonance': [
        { name: 'Inhale', duration: 5000, scale: 3 },
        { name: 'Exhale', duration: 5000, scale: 1 }
      ]
    };

    let isRunning = false;
    let currentLoopId = null;
    let audioCtx;
    let sessionTimer = null;
    let boltStartTime = 0;

    const toggleBtn = document.getElementById('toggleBtn');
    const patternSelect = document.getElementById('patternSelect');
    const durationSelect = document.getElementById('durationSelect');
    const circle = document.getElementById('circle');
    const instruction = document.getElementById('instruction');
    const subInstruction = document.getElementById('subInstruction');

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    function playChime(type) {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();

      const osc = audioCtx.createOscillator();
      const gainNode = audioCtx.createGain();
      
      if (type === 'Inhale') osc.frequency.value = 440; 
      else if (type === 'Exhale') osc.frequency.value = 349.23; 
      else osc.frequency.value = 392.00; 

      osc.type = 'sine';
      gainNode.gain.setValueAtTime(0, audioCtx.currentTime);
      gainNode.gain.linearRampToValueAtTime(0.15, audioCtx.currentTime + 0.1);
      gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.5);

      osc.connect(gainNode);
      gainNode.connect(audioCtx.destination);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + 1.5);
    }

    // Helper to change circle color dynamically
    function setCircleColor(color1, color2, shadowColor) {
      circle.style.background = `radial-gradient(circle, ${color1} 0%, ${color2} 100%)`;
      circle.style.boxShadow = `0 0 30px ${shadowColor}`;
    }

    async function runStandardLoop(patternKey) {
      const pattern = patterns[patternKey];
      const loopId = Symbol();
      currentLoopId = loopId;

      while (isRunning && currentLoopId === loopId) {
        for (let phase of pattern) {
          if (!isRunning || currentLoopId !== loopId) break;

          instruction.innerText = phase.name;
          playChime(phase.name);

          circle.style.transitionDuration = `${phase.duration}ms`;
          circle.style.transform = `scale(${phase.scale})`;

          await sleep(phase.duration);
        }
      }
    }

    async function runBoltTest() {
      const loopId = Symbol();
      currentLoopId = loopId;
      boltStartTime = 0;

      // 1. Prepare: Inhale
      instruction.innerText = "Normal Inhale";
      playChime('Inhale');
      circle.style.transitionDuration = '4000ms';
      circle.style.transform = 'scale(1.5)';
      await sleep(4000);
      if (!isRunning || currentLoopId !== loopId) return;

      // 2. Prepare: Exhale
      instruction.innerText = "Normal Exhale";
      playChime('Exhale');
      circle.style.transitionDuration = '4000ms';
      circle.style.transform = 'scale(1)';
      await sleep(4000);
      if (!isRunning || currentLoopId !== loopId) return;

      // 3. Hold & Time
      boltStartTime = Date.now();
      playChime('Hold');
      subInstruction.innerText = "Tap Stop at first urge";
      
      while (isRunning && currentLoopId === loopId) {
        let elapsed = Math.floor((Date.now() - boltStartTime) / 1000);
        instruction.innerHTML = `Hold<br>${elapsed}s`;
        
        // Update circle color based on score tier
        if (elapsed < 10) {
          setCircleColor('#ff4b4b', '#ff2a2a', 'rgba(255, 75, 75, 0.4)'); // Red (Poor)
        } else if (elapsed < 20) {
          setCircleColor('#ffa500', '#ffb732', 'rgba(255, 165, 0, 0.4)'); // Orange (Average)
        } else if (elapsed < 40) {
          setCircleColor('#a8ff78', '#52c234', 'rgba(168, 255, 120, 0.4)'); // Green (Good)
        } else {
          setCircleColor('#4facfe', '#00f2fe', 'rgba(79, 172, 254, 0.4)'); // Blue (Optimal)
        }

        // Gentle pulse to show it's active
        circle.style.transitionDuration = '500ms';
        circle.style.transform = elapsed % 2 === 0 ? 'scale(1.05)' : 'scale(1)';
        
        await sleep(200);
      }
    }

    function stopBreathing(autoStop = false) {
      isRunning = false;
      
      if (sessionTimer) {
        clearTimeout(sessionTimer);
        sessionTimer = null;
      }

      toggleBtn.innerText = 'Start';
      toggleBtn.classList.remove('stop');
      circle.style.transitionDuration = '1000ms';
      circle.style.transform = 'scale(1)';
      
      // Reset colors and text
      setCircleColor('#4facfe', '#00f2fe', 'rgba(79, 172, 254, 0.4)');
      subInstruction.innerText = "";
      patternSelect.disabled = false;
      
      if (patternSelect.value !== 'bolt') durationSelect.disabled = false;

      // Logic to display BOLT score or Session Complete
      if (patternSelect.value === 'bolt' && boltStartTime > 0 && !autoStop) {
        let finalTime = Math.floor((Date.now() - boltStartTime) / 1000);
        
        let category = "";
        let color = "";
        
        if (finalTime < 10) {
          category = "Poor";
          color = "#ff4b4b"; 
        } else if (finalTime < 20) {
          category = "Average";
          color = "#ffa500"; 
        } else if (finalTime < 40) {
          category = "Good";
          color = "#a8ff78"; 
        } else {
          category = "Optimal";
          color = "#4facfe"; 
        }

        instruction.innerHTML = `BOLT Score<br><span style="color:${color}; font-size: 36px;">${finalTime}s</span><br><span style="font-size:18px; color:${color};">${category}</span>`;
        boltStartTime = 0;
      } else {
        instruction.innerText = autoStop ? 'Session Complete' : 'Ready';
      }
      
      currentLoopId = null;
    }

    patternSelect.addEventListener('change', (e) => {
      if (e.target.value === 'bolt') {
        durationSelect.value = "0";
        durationSelect.disabled = true;
      } else {
        durationSelect.disabled = false;
      }
    });

    toggleBtn.addEventListener('click', () => {
      if (isRunning) {
        stopBreathing();
      } else {
        isRunning = true;
        toggleBtn.innerText = 'Stop';
        toggleBtn.classList.add('stop');
        patternSelect.disabled = true;
        durationSelect.disabled = true;
        
        // Clear previous score/sub-instructions on new start
        subInstruction.innerText = ""; 

        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        const durationMs = parseInt(durationSelect.value) * 60 * 1000;
        if (durationMs > 0 && patternSelect.value !== 'bolt') {
          sessionTimer = setTimeout(() => {
            stopBreathing(true);
          }, durationMs);
        }

        if (patternSelect.value === 'bolt') {
          runBoltTest();
        } else {
          runStandardLoop(patternSelect.value);
        }
      }
    });
  </script>
</body>
</html>
